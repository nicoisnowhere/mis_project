<body>
    <header class="d-flex p-2">
        <img class="img-thumbnail" src="https://images.unsplash.com/vector-1766156189573-89131fb0722d?q=80&w=1686&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="logo" width="9%">
        <h1>Productly</h1>
    </header>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/about.html" class="nav-link">About</a>
        <a href="/products.html" class="nav-link">Products</a>
        <a href="#" class="nav-link active" aria-current="page">Contact</a>
    </nav>
    <article class="container">
        <p>We would love to hear from you!</p>
        <form method="post" action="http://www.randyconnolly.com/tests/process.php">

<fieldset id="contact-info">
    <legend>Customer contact information</legend>

    <div>
        <label for = "fname"> First name:</label>
             <input type = "text" id = "contact-info" name = "fname" placeholder="Enter first name">
                    </div>

                     <div>
        <label for = "lname"> Last name:</label>
            <input type = "text" id = "contact-info" name = "lname" placeholder="Enter Last name">
    </div>

                <div>
        <label for = "Email"> Email:</label>
            <input type = "email" id = "contact-info" name = "Email" placeholder="p@gmail.com">
   </div>

    <div>
        <label for = "phone"> Phone number:</label>
            <input type = "tel" id = "contact-info" name = "phone" placeholder="xxx-xxx-xxxx ">
    </div>
    <div>
      <input type="checkbox" id="consent" name="consent" value="True">
      <label for="consent"> I want to receive alerts for deals and new products.</label>
    </div>
<br>
    <fieldset id="product-info">
        <p>What are you contacting us about?</p>
        <div class="btn-group" role="group" aria-label="Reason for contact">
            <input type="radio" class="btn-check" id="reason1" name="reason" value="Existing product">
            <label class="btn btn-outline-primary" for="reason1">Existing product</label><br>
            <input type="radio" class="btn-check" id="reason2" name="reason" value="New product request">
            <label class="btn btn-outline-primary" for="reason2">New product request</label><br>
            <input type="radio" class="btn-check" id="reason3" name="reason" value="Other reason">
            <label class="btn btn-outline-primary" for="reason3">Other reason</label><br>
        </div>
    </fieldset><br>
</fieldset>
    <fieldset id="more-info">
        <legend>What would you like to say?</legend>
        <textarea id="info" name="more-info" rows="5" cols="33"></textarea>      
    </fieldset>

            <br>

            <div>
             <input type = "submit">
                </div>

        </form>
    </article>
    <footer class="card">
        <div class="card-body">Copyright 2026</div>
    </footer>
</body>
